<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
      cursor: default;
    }

    .stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 6px;
    }

    .pet {
      position: relative;
      width: 75px;
      height: 105px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: grab;
    }
    .pet:active { cursor: grabbing; }

    /* ground shadow */
    .shadow {
      position: absolute;
      bottom: 3px;
      left: 50%;
      width: 46px;
      height: 8px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center, rgba(20,50,50,0.32), rgba(20,50,50,0) 70%);
      filter: blur(1px);
      transform-origin: center;
    }

    .char-wrap {
      position: relative;
      height: 98px;
      width: 64px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform-origin: 50% 100%;
      will-change: transform;
    }

    .char {
      height: 100%;
      width: auto;
      display: block;
      transform-origin: 50% 100%;
      -webkit-user-drag: none;
      filter: drop-shadow(0 6px 10px rgba(20,50,50,0.22));
    }

    /* 포즈 전환: 평소엔 서 있고, 작업 중엔 마법봉 두 프레임을 교차 */
    .char-wand {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: none;
    }
    .state-working .char-stand { visibility: hidden; }
    .state-working .char-wand  { display: block; }

    /* speech / prop bubble */
    .bubble {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%) scale(0.6);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(20,80,80,0.12);
      border-radius: 999px;
      box-shadow: 0 4px 11px rgba(20,50,50,0.18);
      font-size: 9px;
      font-weight: 800;
      color: #1c3a3a;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease, transform .35s cubic-bezier(.2,1.4,.4,1);
    }
    .bubble.show { opacity: 1; transform: translateX(-50%) scale(1); }
    .bubble .emo { font-size: 11px; line-height: 1; }
    .bubble::after {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid rgba(255,255,255,0.96);
    }

    /* floating Zzz for sleeping */
    .zzz {
      position: absolute;
      top: 24px;
      left: 64%;
      font-size: 16px;
      font-weight: 900;
      color: #6a8a88;
      opacity: 0;
    }
    .state-sleeping .zzz { animation: zzz 2.6s ease-in-out infinite; }
    @keyframes zzz {
      0% { opacity: 0; transform: translate(0,0) scale(.7); }
      15% { opacity: .9; }
      100% { opacity: 0; transform: translate(14px,-34px) scale(1.25); }
    }

    /* close button on hover */
    .x-btn {
      position: absolute;
      top: 2px;
      right: 6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(20,50,50,0.55);
      color: #fff;
      font-size: 12px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 5;
    }
    .pet:hover .x-btn { opacity: 1; }
    .x-btn:hover { background: rgba(180,60,60,0.9); }

    /* ===== per-state body animations ===== */
    .state-idle    .char-wrap { animation: breathe 3.6s ease-in-out infinite; }
    .state-idle    .char      { animation: blink 5.2s steps(1) infinite; }

    .state-thinking .char-wrap { animation: think 1.9s ease-in-out infinite; }
    .state-working  .char-wrap { animation: typing 2.6s ease-in-out infinite; }
    .state-working  .shadow    { animation: typingshadow 2.6s ease-in-out infinite; }
    .state-working  .char-wand-up   { animation: wandUp 2s steps(1, end) infinite; }
    .state-working  .char-wand-down { animation: wandDown 2s steps(1, end) infinite; }
    .state-waiting  .char-wrap { animation: look 2.2s ease-in-out infinite; }
    .state-resting  .char-wrap { animation: sway 4.2s ease-in-out infinite; }
    .state-sleeping .char-wrap { animation: sleep 5s ease-in-out infinite; }
    .state-sleeping .char      { filter: drop-shadow(0 6px 10px rgba(20,50,50,0.22)) brightness(0.94) saturate(0.9); }

    @keyframes breathe {
      0%,100% { transform: translateY(0) scaleY(1); }
      50%     { transform: translateY(-1px) scaleY(1.025) scaleX(0.99); }
    }
    @keyframes blink { /* subtle bob accent */
      0%, 92%, 100% { opacity: 1; }
    }
    @keyframes think {
      0%,100% { transform: translateY(0) rotate(0deg); }
      30%     { transform: translateY(-3px) rotate(-3deg); }
      65%     { transform: translateY(-1px) rotate(2.5deg); }
    }
    /* 작업 중: 좌우로 살짝 흔들리며 타이핑하는 듯한 잔잔한 모션 (B안) */
    @keyframes typing {
      0%,100% { transform: translateX(-1px) rotate(-1.2deg); }
      50%     { transform: translateX(1px) rotate(1.2deg); }
    }
    @keyframes typingshadow {
      0%,100% { transform: translateX(-50%) scaleX(1); opacity: .85; }
      50%     { transform: translateX(-50%) scaleX(.96); opacity: .8; }
    }
    /* 작업 중: 마법봉 위/아래 두 프레임을 천천히 교차 */
    @keyframes wandUp {
      0%, 49.99% { opacity: 1; }
      50%, 100%  { opacity: 0; }
    }
    @keyframes wandDown {
      0%, 49.99% { opacity: 0; }
      50%, 100%  { opacity: 1; }
    }
    @keyframes look {
      0%,100% { transform: rotate(0deg) translateX(0); }
      25%     { transform: rotate(-4deg) translateX(-3px); }
      75%     { transform: rotate(4deg) translateX(3px); }
    }
    @keyframes sway {
      0%,100% { transform: rotate(-2deg); }
      50%     { transform: rotate(2deg); }
    }
    @keyframes sleep {
      0%,100% { transform: rotate(-3deg) translateY(0) scaleY(1); }
      50%     { transform: rotate(-3deg) translateY(1px) scaleY(0.985); }
    }

    @media (prefers-reduced-motion: reduce) {
      .char-wrap, .shadow, .char { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="stage state-idle" id="stage">
    <div class="pet" id="pet">
      <button class="x-btn" id="xBtn" title="종료">×</button>
      <div class="bubble" id="bubble"><span class="emo" id="bubbleEmo">💤</span><span id="bubbleTxt">대기 중</span></div>
      <div class="zzz">z</div>
      <div class="shadow"></div>
      <div class="char-wrap">
        <img class="char char-stand" id="charStand" src="assets/character.png" alt="펫" />
        <img class="char char-wand char-wand-up"   src="assets/wand_up.png"   alt="펫(마법봉 위)" />
        <img class="char char-wand char-wand-down" src="assets/wand_down.png" alt="펫(마법봉 아래)" />
      </div>
    </div>
  </div>

  <script>
    const STATES = {
      idle:     { emo: "🙂", txt: "대기 중",          bubble: false },
      thinking: { emo: "💭", txt: "생각 중…",         bubble: true  },
      working:  { emo: "⌨️", txt: "작업 중!",         bubble: true  },
      waiting:  { emo: "❓", txt: "입력 기다리는 중",  bubble: true  },
      resting:  { emo: "☕", txt: "쉬는 중",          bubble: true  },
      sleeping: { emo: "💤", txt: "Zzz…",            bubble: true  }
    };

    const stage = document.getElementById("stage");
    const bubble = document.getElementById("bubble");
    const bubbleEmo = document.getElementById("bubbleEmo");
    const bubbleTxt = document.getElementById("bubbleTxt");

    let current = "idle";

    function setState(s) {
      if (!STATES[s]) s = "idle";
      current = s;
      stage.className = "stage state-" + s;
      const info = STATES[s];
      bubbleEmo.textContent = info.emo;
      bubbleTxt.textContent = info.txt;
      bubble.classList.toggle("show", info.bubble);
    }

    // ----- Electron 연동 -----
    if (window.petAPI) {
      window.petAPI.onState(setState);

      // 드래그로 창 이동
      const pet = document.getElementById("pet");
      let dragging = false, lx = 0, ly = 0;
      pet.addEventListener("mousedown", (e) => {
        if (e.target.closest(".x-btn")) return;
        dragging = true; lx = e.screenX; ly = e.screenY; e.preventDefault();
      });
      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        window.petAPI.drag(e.screenX - lx, e.screenY - ly);
        lx = e.screenX; ly = e.screenY;
      });
      window.addEventListener("mouseup", () => { dragging = false; });

      document.getElementById("xBtn").addEventListener("click", () => window.petAPI.quit());
    } else {
      // ----- 브라우저 데모 모드: 상태 자동 순환 -----
      const order = ["idle", "thinking", "working", "waiting", "resting", "sleeping"];
      let i = 0;
      setState(order[0]);
      setInterval(() => { i = (i + 1) % order.length; setState(order[i]); }, 2800);
      document.getElementById("xBtn").style.display = "none";
    }
  </script>
</body>
</html>
